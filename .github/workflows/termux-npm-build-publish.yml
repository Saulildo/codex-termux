name: termux-npm-build-publish

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Git ref or branch to build"
        required: true
        type: string
        default: "main"
      publish_npm:
        description: "Publish npm package (@mmmbuto/codex-cli-termux)"
        required: true
        type: boolean
        default: false
      create_release:
        description: "Create or update GitHub release with packaged assets"
        required: true
        type: boolean
        default: false
      npm_tag:
        description: "npm dist-tag to use when publish_npm=true"
        required: true
        type: string
        default: "latest"
      release_tag:
        description: "Release tag override (defaults to v<package.version>)"
        required: false
        type: string
        default: ""

jobs:
  build-android-arm64:
    name: Build Android ARM64 binaries
    runs-on: android-heavy
    timeout-minutes: 120
    steps:
      - name: Checkout
        shell: bash
        run: |
          set -euo pipefail
          cd "${FORGEJO_RUNNER_WORKDIR}"
          git init .
          git remote add origin "${FORGEJO_RUNNER_GIT_URL}"
          git fetch origin "${{ github.event.inputs.source_ref }}"
          git checkout FETCH_HEAD

      - name: Resolve version and tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          cd "${FORGEJO_RUNNER_WORKDIR}"
          version="$(python3 -c "import json; print(json.load(open('npm-package/package.json'))['version'])")"
          if [[ -n "${{ github.event.inputs.release_tag }}" ]]; then
            release_tag="${{ github.event.inputs.release_tag }}"
          else
            release_tag="v${version}"
          fi
          ref_sha="$(git rev-parse HEAD)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "ref_sha=${ref_sha}" >> "$GITHUB_OUTPUT"
          echo "Version: ${version}  Tag: ${release_tag}  SHA: ${ref_sha}"

      - name: Setup environment
        shell: bash
        run: |
          set -euo pipefail
          cd "${FORGEJO_RUNNER_WORKDIR}"
          export ANDROID_NDK_HOME="/home/dag/android-ndk/android-ndk-r27c"
          export ANDROID_NDK_ROOT="${ANDROID_NDK_HOME}"
          export PATH="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin:${PATH}"
          eval "$(python3 scripts/fetch_rusty_v8_android.py | grep '^export ' | sed 's/^export //')"
          echo "ANDROID_NDK_HOME=${ANDROID_NDK_HOME}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=${ANDROID_NDK_ROOT}" >> "$GITHUB_ENV"
          echo "PATH=${PATH}" >> "$GITHUB_ENV"
          echo "RUSTY_V8_ARCHIVE=${RUSTY_V8_ARCHIVE}" >> "$GITHUB_ENV"
          echo "RUSTY_V8_SRC_BINDING_PATH=${RUSTY_V8_SRC_BINDING_PATH}" >> "$GITHUB_ENV"
          echo "CC_aarch64_linux_android=aarch64-linux-android29-clang" >> "$GITHUB_ENV"
          echo "CXX_aarch64_linux_android=aarch64-linux-android29-clang++" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=llvm-ar" >> "$GITHUB_ENV"
          echo "RANLIB_aarch64_linux_android=llvm-ranlib" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"
          echo "OPENSSL_NO_PKG_CONFIG=1" >> "$GITHUB_ENV"

      - name: Cargo build (aarch64-linux-android)
        shell: bash
        run: |
          set -euo pipefail
          cd "${FORGEJO_RUNNER_WORKDIR}/codex-rs"
          rustup run 1.93.0 cargo build --target aarch64-linux-android --release -p codex-cli -p codex-exec

      - name: Stage Android binaries
        shell: bash
        run: |
          set -euo pipefail
          cd "${FORGEJO_RUNNER_WORKDIR}"
          out="npm-package/bin"
          cp "codex-rs/target/aarch64-linux-android/release/codex" "${out}/codex.bin"
          cp "codex-rs/target/aarch64-linux-android/release/codex-exec" "${out}/codex-exec.bin"
          cp "${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so" "${out}/libc++_shared.so"
          chmod +x "${out}/codex" "${out}/codex-exec" "${out}/codex.bin" "${out}/codex-exec.bin" "${out}/libc++_shared.so"
          ls -lh "${out}/"

      - name: Verify patches
        shell: bash
        run: |
          set -euo pipefail
          cd "${FORGEJO_RUNNER_WORKDIR}"
          bash verify-patches.sh

      - name: npm pack
        id: npm_pack
        shell: bash
        run: |
          set -euo pipefail
          cd "${FORGEJO_RUNNER_WORKDIR}/npm-package"
          tarball="$(npm pack)"
          echo "tarball=${tarball}" >> "$GITHUB_OUTPUT"
          ls -lh "${tarball}"

      - name: Upload npm tarball as artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-termux-tarball
          path: npm-package/*.tgz

      - name: npm publish
        if: ${{ github.event.inputs.publish_npm == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          cd "${FORGEJO_RUNNER_WORKDIR}/npm-package"
          npm publish "${{ steps.npm_pack.outputs.tarball }}" --tag "${{ github.event.inputs.npm_tag }}"
