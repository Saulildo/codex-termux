name: termux-npm-build-publish

on:
  push:
    branches:
      - main
      - 'merge/**'
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Git ref or branch to build"
        required: true
        type: string
        default: "main"
      publish_npm:
        description: "Publish npm package"
        required: true
        type: boolean
        default: false
      npm_tag:
        description: "npm dist-tag"
        required: true
        type: string
        default: "test"

jobs:
  build-android-arm64:
    name: Build Android ARM64
    runs-on: android-heavy
    timeout-minutes: 120
    steps:
      - name: Checkout
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "${{ github.ref_name }}" "/home/dag/Dev/05_termux/codex-termux" .

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          export ANDROID_NDK_HOME="/home/dag/android-ndk/android-ndk-r27c"
          export ANDROID_NDK_ROOT="${ANDROID_NDK_HOME}"
          export PATH="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin:${PATH}"
          eval "$(python3 scripts/fetch_rusty_v8_android.py | grep '^export ' | sed 's/^export //')"
          export RUSTY_V8_ARCHIVE RUSTY_V8_SRC_BINDING_PATH
          export CC_aarch64_linux_android="aarch64-linux-android29-clang"
          export CXX_aarch64_linux_android="aarch64-linux-android29-clang++"
          export AR_aarch64_linux_android="llvm-ar"
          export RANLIB_aarch64_linux_android="llvm-ranlib"
          export PKG_CONFIG_ALLOW_CROSS=1
          export OPENSSL_NO_PKG_CONFIG=1
          cd codex-rs
          rustup run 1.93.0 cargo build --target aarch64-linux-android --release -p codex-cli -p codex-exec

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          cp codex-rs/target/aarch64-linux-android/release/codex npm-package/bin/codex.bin
          cp codex-rs/target/aarch64-linux-android/release/codex-exec npm-package/bin/codex-exec.bin
          cp "${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so" npm-package/bin/libc++_shared.so
          chmod +x npm-package/bin/codex npm-package/bin/codex-exec npm-package/bin/codex.bin npm-package/bin/codex-exec.bin npm-package/bin/libc++_shared.so
          bash verify-patches.sh
          cd npm-package
          npm pack
          ls -lh *.tgz

      - name: Publish
        if: ${{ github.event.inputs.publish_npm == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          cd npm-package
          npm publish *.tgz --tag "${{ github.event.inputs.npm_tag || 'test' }}"
